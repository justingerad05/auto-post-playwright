name: Scheduled Browser Posting (Playwright)

on:
  workflow_dispatch: {}
  schedule:
    # every 4 hours (adjust if you want)
    - cron: '0 */4 * * *'

permissions:
  contents: read
  id-token: write

jobs:
  run-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours (default). shorten if you like
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci || npm install
          npx playwright install --with-deps

      - name: Run post script
        env:
          MEDIUM_EMAIL: ${{ secrets.MEDIUM_EMAIL }}
          MEDIUM_PASSWORD: ${{ secrets.MEDIUM_PASSWORD }}
          MIX_EMAIL: ${{ secrets.MIX_EMAIL }}
          MIX_PASSWORD: ${{ secrets.MIX_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}   # optional: http://user:pass@host:port
        run: |
          node scripts/post.js
